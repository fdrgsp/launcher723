name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-macos:
    name: "macOS"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv run pytest tests/test_macos_launcher.py -v

  test-windows:
    name: "Windows"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - run: uv run pytest tests/test_windows_launcher.py -v
